tools:
  - name: compact_history
    description: >
      Finalize semantic memory compaction. Use this only after generating a title, commit summary,
      and complete replacement MEMORY.md and TODO.md. The tool backs up the raw dialogue history,
      installs the generated MEMORY.md and TODO.md, removes live dialogue.json so the next run
      starts fresh, and commits the updated private memory state.
    inputs:
      title:
        type: string
        description: >
          Terse one-line title for the raw-history backup and compaction commits. This should name
          the actual topic or state of the conversation, especially if work is still in progress.
          No markdown, no quotes, under 80 characters.
        required: true
      summary:
        type: string
        description: >
          Concise commit-body summary of what changed in durable memory. Include the key decisions,
          implementation facts, user preferences, open threads, and whether the conversation ended
          mid-task. This is for git history, not a full transcript.
        required: true
      memory:
        type: string
        description: >
          Complete replacement contents for .could-you/MEMORY.md. Preserve durable continuity for a
          future agent with empty live history: project state, next steps, limitations, user-specific
          preferences and values, trust/privacy boundaries, and any in-progress continuation point.
        required: true
      todo:
        type: string
        description: >
          Complete replacement contents for .could-you/TODO.md. Preserve only active open loops,
          current priorities, next actions, and unresolved questions that should remain live after
          compaction. Do not keep completed or stale items.
        required: true
    run: |
      set -eu

      title_file=".could-you/.compact-title.tmp"
      summary_file=".could-you/.compact-summary.tmp"
      memory_file=".could-you/.compact-memory.tmp"
      todo_file=".could-you/.compact-todo.tmp"

      printf '%s\n' "$INPUTS__TITLE" > "$title_file"
      printf '%s\n' "$INPUTS__SUMMARY" > "$summary_file"
      printf '%s\n' "$INPUTS__MEMORY" > "$memory_file"
      printf '%s\n' "$INPUTS__TODO" > "$todo_file"

      title="$(head -n 1 "$title_file" | tr -d '\r')"
      summary="$(cat "$summary_file")"

      if [ -z "$title" ]; then
        echo "compact_history requires a non-empty title" >&2
        exit 1
      fi

      if [ ! -s .could-you/dialogue.jsonl ]; then
        echo "missing .could-you/dialogue.jsonl" >&2
        exit 1
      fi

      cp "$memory_file" .could-you/MEMORY.md
      cp "$todo_file" .could-you/TODO.md

      # Archive the dialogue file instead of deleting it
      mkdir -p .could-you/conversations
      archive_file_basename="$(date -u +%Y%m%dT%H%M%SZ).jsonl"
      archive_file_repo_path="conversations/$archive_file_basename"
      archive_file_workspace_path=".could-you/$archive_file_repo_path"
      mv .could-you/dialogue.jsonl "$archive_file_workspace_path"

      cd .could-you
      git add MEMORY.md TODO.md "$archive_file_repo_path"
      git commit -m "memory: compact history: $title" -m "$summary"

      rm -f .compact-title.tmp .compact-summary.tmp .compact-memory.tmp .compact-todo.tmp

      echo "Compacted history: $title"
