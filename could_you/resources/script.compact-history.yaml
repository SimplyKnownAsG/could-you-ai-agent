query: |
  You are performing explicit memory gardening / history compaction for could-you.

  This is a maintenance operation, not a normal user conversation.

  could-you has the following context available for LLM's like you!

  - The dialogue - this is the actual conversation messages. It is temporary, and growing. It is also a problem, because
    it cannot grow indefinitely. This script is being run to wipe the dialogue clear, and reset the conversation without
    losing conversational continuity.
  - system prompt. could-you allows the user to use the COULD_YOU_LOAD_FILE "macro" to expand file paths into the system prompt. The
    default system prompt contains:

    - .could-you/SYSTEM_PROMPT.md contains standing identity, behavior, and operating rules.
    - .could-you/FORMATIVE.md holds stable, high-confidence, identity-shaping memories and should change slowly.
    - .could-you/MEMORY.md holds durable but more fluid continuity: project state, implementation facts, decisions,
      limitations, and continuation points.
    - .could-you/TODO.md holds active working intent, open loops, and next actions. It should reflect what is still live
      after compaction.

    If the system prompt DOES NOT contain <could-you-prompt-expanded-file > markers, then the user may not be using the
    COULD_YOU_LOAD_FILE feature. That's fine, we can still proceed. However, it would probably make sense to warn them!
  - tool descriptions - translated for the appropriate LLM from the mcpServers in the configuration.

  Your job:
  - Interpert the loaded context that includes the system propmt, the dialogue, and the tool descriptions.
  - Briefly identify the primary task or topic in the live dialogue before deciding what should survive compaction.
  - Decide what should survive after the live dialogue is removed.
  - Produce a terse one-line title for this conversation/task history. This is used as a git commit title.
  - Produce a concise longer summary suitable for a git commit body.
  - Produce a complete updated replacement for .could-you/MEMORY.md.
  - Produce a complete updated replacement for .could-you/TODO.md.
  - Call the compact_history tool exactly once.

  What MEMORY.md should preserve:
  - Current project state and recent implementation facts.
  - Open decisions, next steps, and known limitations.
  - User preferences and values that are likely to matter later.
  - Trust/security/privacy boundaries.
  - If the conversation is in the middle of work, explicitly say so and record the immediate continuation point.
  - Any corrections where earlier assumptions were wrong.

  What TODO.md should preserve:
  - Only active open loops and next actions that still matter.
  - The current priority and immediate continuation point.
  - Important unresolved questions.

  What TODO.md should avoid:
  - Completed side quests.
  - Resolved investigations.
  - Stale tasks that no longer matter.
  - Items that belong in durable memory rather than active work tracking.

  What both files should avoid:
  - Raw transcript dumps.
  - Ephemeral chatter with no future value.
  - Secrets, credentials, or sensitive implementation details not needed for continuity.
  - Unsupported guesses about the user. Infer preferences only from clear evidence.

  Constraints:
  - Do not ask the user questions.
  - Do not call any tool except compact_history.
  - The title must be one line, no quotes, no markdown, under 80 characters.
  - The summary should be concise but preserve important decisions and implementation facts.
  - The memory input must be the complete desired contents of .could-you/MEMORY.md.
  - The todo input must be the complete desired contents of .could-you/TODO.md.
  - Write MEMORY.md and TODO.md in a form useful to a future agent starting with empty dialogue.json.

  Generate:
  1. a terse one-line title,
  2. a concise summary,
  3. a complete updated MEMORY.md,
  4. a complete updated TODO.md,

  then call compact_history exactly once with those values.

# Compaction is the explicit escape hatch for high memory pressure, so this script
# raises the policy thresholds above normal interactive limits. The real model
# context limit still applies; this only prevents could-you's configured rejection
# threshold from blocking the maintenance run that is meant to relieve pressure.
memory:
  warningThresholdPercent: 95
  rejectionThresholdPercent: 100

dialogue:
  load: true
  store: false

mcpServers:
  any-script:
    command: npx
    args:
      - any-script-mcp
    env:
      ANY_SCRIPT_MCP_CONFIG: "$COULD_YOU_WORKSPACE/.could-you/script.compact-history.any-script.yaml"
    enabled: true
