# global environment variables
env:
  VARIABLE_NAME: "value"
  DEFAULT_AWS_PROFILE: "some-profile-name"


# LLM configuration
llm:
  # # sample boto3
  # provider: boto3
  # init: {}
  # args:
  #   modelId: us.anthropic.claude-sonnet-4-20250514-v1:0
  #   inferenceConfig:
  #     topP: 0.1

  # sample OpenAI
  provider: openai
  init:
    api_key: "sk-..."
  args:
    model: gpt-4.1


# Memory/context pressure thresholds
memory:
  # Warn before sending a query when prior assistant token usage is at or above this percentage.
  warningThresholdPercent: 75
  # Reject the next query when prior assistant token usage is at or above this percentage.
  rejectionThresholdPercent: 90

# MCP Servers
mcpServers:
  git-mcp:
    command: uvx
    args:
      - mcp-server-git
    disabledTools:
      - git_reset
  filesystem:
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "$COULD_YOU_WORKSPACE"
    disabledTools:
      - directory_tree
